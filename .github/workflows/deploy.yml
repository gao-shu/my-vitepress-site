name: Deploy VitePress

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 拉代码
        uses: actions/checkout@v4

      - name: Node环境
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm' # 启用 npm 缓存，加速安装并减少冲突

      - name: 安装依赖
        run: npm ci # 使用 npm ci 代替 npm install，更严格且适合 CI 环境

      - name: 构建
        run: npm run build # 确保 package.json 中有 "build": "vitepress build docs"

      - name: 部署
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: docs/.vitepress/dist